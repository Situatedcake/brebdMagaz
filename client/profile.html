<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrebdMagaz - Профиль</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="profile-page">
    <header id="site-header"></header>

    <main class="page">
      <section class="panel narrow">
        <h1>Профиль</h1>
        <div id="profile-card"></div>
        <form id="profile-form" class="form">
          <label>Имя <input type="text" name="name" required /></label>
          <label>Добавить аватар <input id="profile-avatar-input" type="file" name="avatarFile" accept="image/*" /></label>
          <img id="profile-avatar-preview" class="avatar-preview" src="" alt="avatar preview" />
          <button class="btn" type="submit">Сохранить изменения</button>
        </form>
        <p id="profile-message" class="message"></p>
      </section>

      <section class="panel">
        <h2>Мои заказы</h2>
        <div id="orders-list"></div>
      </section>
    </main>

    <script type="module" src="/js/profile.js"></script>
  </body>
</html>
