<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrebdMagaz - Вход</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="auth-page">
    <header id="site-header"></header>

    <main class="page">
      <section class="panel narrow">
        <h1>Вход</h1>
        <form id="login-form" class="form">
          <label>Email <input type="email" name="email" required /></label>
          <label>
            Пароль
            <div class="input-with-action">
              <input id="login-password" type="password" name="password" required />
              <button class="input-action-btn" type="button" data-toggle-password="login-password">Показать</button>
            </div>
          </label>
          <button class="btn" type="submit">Войти</button>
        </form>
        <p class="muted">Тестовый пользователь: ivan@shop.local / user123</p>
        <p class="muted">Админ: admin@shop.local / admin123</p>
        <p id="login-message" class="message"></p>
      </section>
    </main>

    <script type="module" src="/js/login.js"></script>
  </body>
</html>
