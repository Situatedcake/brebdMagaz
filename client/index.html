<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrebdMagaz - Главная</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header id="site-header"></header>

    <main class="page">
      <section class="hero">
        <h1>Интернет-магазин брендовой одежды</h1>
        <p>Выбирайте вещи в холодной палитре и собирайте стильный гардероб.</p>
      </section>

      <section class="panel">
        <div class="search-row">
          <input id="search-input" type="text" placeholder="Поиск по названию, бренду, категории..." />
          <button id="search-btn" class="btn">Найти</button>
        </div>
      </section>

      <section>
        <div id="products-grid" class="products-grid"></div>
        <div id="scroll-sentinel" class="scroll-sentinel" aria-hidden="true"></div>
      </section>
    </main>

    <script type="module" src="/js/main.js"></script>
  </body>
</html>
